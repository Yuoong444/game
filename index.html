<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>회사원 키우기 - PC/모바일 대응</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="page">
  <div class="app">

    <header class="header">
      <div>
        <p>OFFICE IDLE RPG</p>
        <h1>회사원 키우기</h1>
      </div>
      <button id="resetBtn" class="reset">초기화</button>
    </header>

    <section class="money-card">
      <span>보유 자산</span>
      <strong id="money">0원</strong>
    </section>

    <main class="main">

      <section id="gamePanel" class="panel active">
        <div class="character-card">
          <div id="character" class="character">🧑‍💼</div>
          <h2 id="rankName">신입사원</h2>
          <p>강화 +<b id="level">0</b></p>
        </div>

        <div class="stats">
          <div>
            <span>클릭 수익</span>
            <b id="clickIncome">100</b>
          </div>
          <div>
            <span>자동 수익</span>
            <b id="autoIncome">0</b>
          </div>
          <div>
            <span>성공률</span>
            <b><span id="rate">90</span>%</b>
          </div>
        </div>

        <p id="msg" class="message">강화하면 새로운 직급이 도감에 등록됩니다.</p>
      </section>

      <section id="bookPanel" class="panel">
        <div class="book-title">
          <h2>직급 도감</h2>
          <span id="bookCount">1 / 6</span>
        </div>
        <div id="collection" class="collection"></div>
      </section>

    </main>

    <nav class="bottom">
      <div class="tabs">
        <button id="gameTab" class="tab active">🎮 게임</button>
        <button id="bookTab" class="tab">📖 도감</button>
      </div>

      <div id="actionButtons" class="actions">
        <button id="workBtn" class="work">💼<br>일하기</button>
        <button id="enhanceBtn" class="enhance">⚒️<br>강화<br><small><span id="cost">1,000</span>원</small></button>
        <button id="autoBtn" class="auto">🤖<br>자동<br><small><span id="autoCost">2,000</span>원</small></button>
      </div>
    </nav>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
