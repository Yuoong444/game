<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>QHD 대응</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app">
<header class="header">
<h1>회사원 키우기</h1>
<h2 id="money">0원</h2>
</header>

<div class="character" id="character">🧑‍💼</div>

<div class="stats">
<p>레벨 <span id="level">0</span></p>
<p>클릭 <span id="click">100</span></p>
<p>자동 <span id="auto">0</span></p>
</div>

<div class="bottom">
<button id="work">일하기</button>
<button id="enhance">강화</button>
<button id="autoBtn">자동</button>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
