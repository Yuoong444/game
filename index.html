<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회사원 키우기 - 강화 시스템</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game">
    <h1>회사원 키우기</h1>
    <p class="sub">방치형 + 강화 실패 시스템</p>

    <div class="character" id="character">🧑‍💼</div>

    <div class="status">
      <h2 id="money">0원</h2>
      <p>강화 레벨: +<span id="level">0</span></p>
      <p>클릭 수익: <span id="clickIncome">100</span>원</p>
      <p>초당 자동 수익: <span id="autoIncome">0</span>원</p>
      <p>강화 성공률: <span id="successRate">90</span>%</p>
    </div>

    <button id="workBtn" class="work">💼 일하기</button>

    <button id="enhanceBtn" class="enhance">
      ⚒️ 강화하기<br>
      비용: <span id="enhanceCost">1,000</span>원
    </button>

    <button id="autoBtn" class="auto">
      🤖 자동 수익 구매<br>
      비용: <span id="autoCost">2,000</span>원
    </button>

    <button id="resetBtn" class="reset">초기화</button>

    <p id="message">강화에 성공하면 수익이 증가합니다!</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
