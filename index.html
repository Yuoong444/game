<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>회사원 키우기 RPG</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="phone">
    <section class="top-bar">
      <div>
        <p class="small">OFFICE IDLE RPG</p>
        <h1>회사원 키우기</h1>
      </div>
      <button id="resetBtn" class="mini-btn">초기화</button>
    </section>

    <section class="money-card">
      <p>보유 자산</p>
      <h2 id="money">0원</h2>
      <div class="income-row">
        <span>터치 +<b id="clickIncome">100</b></span>
        <span>초당 +<b id="autoIncome">0</b></span>
      </div>
    </section>

    <section class="character-zone">
      <div class="aura"></div>
      <div id="character" class="character">🧑‍💼</div>
      <div class="title-box">
        <span id="rankName">신입사원</span>
        <strong>+<span id="level">0</span></strong>
      </div>
      <div class="rate-box">
        강화 성공률 <b id="successRate">90</b>%
      </div>
    </section>

    <section class="quest-card">
      <div class="quest-title">
        <span>오늘의 성장</span>
        <b id="progressText">0 / 5</b>
      </div>
      <div class="progress">
        <div id="progressBar"></div>
      </div>
    </section>

    <section class="log-card">
      <p id="message">업무를 해서 돈을 벌고, 강화에 도전하세요!</p>
    </section>

    <section class="button-grid">
      <button id="workBtn" class="game-btn blue">
        <span>💼</span>
        일하기
      </button>
      <button id="enhanceBtn" class="game-btn red">
        <span>⚒️</span>
        강화<br><small><b id="enhanceCost">1,000</b>원</small>
      </button>
      <button id="autoBtn" class="game-btn gold">
        <span>🤖</span>
        자동수익<br><small><b id="autoCost">2,000</b>원</small>
      </button>
      <button id="bonusBtn" class="game-btn purple">
        <span>🎁</span>
        보너스<br><small id="bonusText">받기</small>
      </button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
